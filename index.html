    function ParticleCanvas() {
      const ref = useRef(null);
      useEffect(() => {
        const canvas = ref.current; if(!canvas) return;
        const ctx = canvas.getContext("2d");
        let raf;
        const mouse={x:-9999,y:-9999};
        const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};
        resize(); window.addEventListener("resize",resize);
        const onM=e=>{mouse.x=e.clientX;mouse.y=e.clientY;};
        window.addEventListener("mousemove",onM);
        const N=70;
        const pts=Array.from({length:N},()=>({
          x:Math.random()*canvas.width, y:Math.random()*canvas.height,
          vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
          r:Math.random()*1.1+.4, a:Math.random()*.45+.08,
        }));
        const draw=()=>{
          ctx.clearRect(0,0,canvas.width,canvas.height);
          pts.forEach(p=>{
            const dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.hypot(dx,dy);
            if(d<110){const f=(110-d)/110*.7;p.vx+=(dx/d)*f;p.vy+=(dy/d)*f;}
            p.vx*=.985;p.vy*=.985;p.x+=p.vx;p.y+=p.vy;
            if(p.x<0||p.x>canvas.width)p.vx*=-1;
            if(p.y<0||p.y>canvas.height)p.vy*=-1;
          });
          for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
            const d=Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y);
            if(d<130){ctx.beginPath();ctx.strokeStyle=`rgba(0,212,255,${(1-d/130)*.065})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}
          }
          pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${p.a})`;ctx.fill();});
          raf=requestAnimationFrame(draw);
        };
        draw();
        return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",resize);window.removeEventListener("mousemove",onM);};
      },[]);
      return React.createElement("canvas",{ref,style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}});
    }
